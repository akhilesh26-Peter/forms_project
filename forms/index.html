<!DOCTYPE html>
<html>

<head>
    <title>forms</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <form>
        <label for="head">
            <h1>Course Registration Form</h1>
        </label>
        <div class="test">
            <fieldset id="f1">
                <legend>Personal details</legend>

                <table>
                    <tr>
                        <td><label for="firstname">First Name</label></td>
                        <td>
                            <input type="text" id="firstname" name="firstname" placeholder="EX:AKHIL" required
                                minlength="2" maxlength="30">
                            <p>Enter Your Name</p>
                        </td>
                    </tr>

                    <tr>
                        <td><label for="surname">Surname</label></td>
                        <td>
                            <input type="text" id="surname" name="surname" placeholder="EX:GUDI" required minlength="2"
                                maxlength="30">
                        </td>
                    </tr>

                    <tr>
                        <td><label for="mobilenumber">Mobile number</label></td>
                        <td>
                            <input type="tel" id="mobilenumber" name="mobilenumber" placeholder="Ex:6301680430" required
                                pattern="[0-9]{10}" maxlength="10">
                        </td>
                    </tr>

                    <tr>
                        <td><label for="Email">Email</label></td>
                        <td>
                            <input type="email" id="Email" name="Email" placeholder="form@gmail.com" required>
                            <img src="check.png" alt="image not found" id="correct">
                            <img src="delete.png" alt="image not found" id="wrong">
                        </td>
                    </tr>

                    <tr>
                        <td><label for="Password">Password</label></td>
                        <td>
                            <input type="password" id="Password" name="Password" placeholder="max 8 characters" required
                                minlength="8" maxlength="8">
                        </td>
                    </tr>

                    <tr>
                        <td><label for="confirmpassword">Confirm Password</label></td>
                        <td>
                            <input type="password" id="confirmpassword" name="confirmpassword"
                                placeholder="max 8 characters" required minlength="8" maxlength="8">
                        </td>
                    </tr>

                    <tr>
                        <td><label for="DOB">DOB</label></td>
                        <td>
                            <input type="date" id="DOB" name="DOB" required>
                        </td>
                    </tr>

                    <tr>
                        <td><label for="age">AGE</label></td>
                        <td>
                            <input type="number" id="age" name="age" required min="18" max="100" step="1">
                            <img src="check.png" alt="image not found" id="correct">
                            <img src="delete.png" alt="image not found" id="wrong">
                        </td>
                    </tr>

                    <tr>
                        <td><label for="gender">Gender</label></td>
                        <td>
                            <input type="radio" id="male" name="gender" value="male" required>
                            <label for="male">male</label>

                            <input type="radio" id="female" name="gender" value="female">
                            <label for="female">female</label>

                            <input type="radio" id="others" name="gender" value="others">
                            <label for="others">others</label>
                        </td>
                    </tr>

                    <tr>
                        <td><label for="selectctry">Select Country</label></td>
                        <td>
                            <select name="selectctry" id="selectctry" required>
                                <option value="">--Select Country--</option>
                                <option value="INDIA">INDIA</option>
                                <option value="USA">USA</option>
                                <option value="CHINA">CHINA</option>
                            </select>
                        </td>
                    </tr>

                    <tr>
                        <td><label for="upload">Upload Picture</label></td>
                        <td>
                            <input type="file" id="upload" name="upload" accept="image/*" required>
                        </td>
                    </tr>

                    <tr>
                        <td><input type="reset"></td>
                    </tr>
                </table>
            </fieldset>
        </div>
        <div>
            <fieldset id="f2">
                <legend>Course Details</legend>

                <table>
                    <tr>
                        <td><label for="course">Select Course</label></td>
                    </tr>

                    <tr>
                        <td>
                            <select name="course" id="course" required>
                                <option value="">--Select Course--</option>
                                <option value="1">PYTHON FULL STACK</option>
                                <option value="2">JAVA FULL STACK</option>
                                <option value="3">DATA ANALYTICS</option>
                            </select>
                        </td>
                    </tr>

                    <tr>
                        <td>Delivery Mode</td>
                    </tr>

                    <tr>
                        <td>
                            <input type="radio" id="online" name="mode" value="online" required>
                            <label for="online">ONLINE</label>

                            <input type="radio" id="offline" name="mode" value="offline">
                            <label for="offline">OFFLINE</label>
                        </td>
                    </tr>

                    <tr>
                        <td>INSTITUTE NAME:</td>
                        <td>
                            <select name="institute" id="institute" required>
                                <option value="">--Select Institute--</option>
                                <option value="1">Tap Academy</option>
                            </select>
                        </td>
                    </tr>

                    <tr>
                        <td><label for="comments">comments</label></td>
                    </tr>

                    <tr>
                        <td>
                            <textarea id="comments" name="comments" required minlength="10" maxlength="300"></textarea>
                        </td>
                    </tr>
                </table>
            </fieldset>
        </div>

        <input type="submit">
    </form>
</body>

</html>
